<header class="app-topbar">
    <div class="container-fluid topbar-menu">
        <div class="d-flex align-items-center gap-2">
            <!-- Sidebar Menu Toggle Button -->
            <button class="sidenav-toggle-button btn btn-default btn-icon">
                <i class="ti ti-menu-4"></i>
            </button>
        </div>

        <div class="d-flex align-items-center gap-2">
            <!-- Light/Dark toggle -->
            <div class="topbar-item">
                <button class="topbar-link" id="light-dark-mode" type="button">
                    <i class="ti ti-moon topbar-link-icon mode-light-moon"></i>
                    <i class="ti ti-sun topbar-link-icon mode-light-sun"></i>
                </button>
            </div>

            <!-- Logout -->
            <div class="topbar-item">
                <button class="topbar-link" type="button" title="Sair">
                    <i class="ti ti-logout topbar-link-icon"></i>
                </button>
            </div>

            <!-- Divisor -->
            <div class="topbar-item d-none d-sm-flex">
                <span class="text-muted" style="font-size:20px; line-height:1">|</span>
            </div>

            <!-- Usuário -->
            <div class="topbar-item nav-user">
                <span class="d-flex align-items-center gap-2 px-2">
                    <i class="ti ti-user-circle fs-22"></i>
                    <span class="d-none d-lg-inline fw-medium">Nome do usuário</span>
                </span>
            </div>
        </div>
    </div>
</header>
<!-- Topbar End -->
